name: Release on Push to Main

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify files
        run: |
          echo "Checking for executable..."
          [ -f "EarnApp-Reviewer.exe" ] && echo "✓ EarnApp-Reviewer.exe found ($(du -h EarnApp-Reviewer.exe | cut -f1))" || echo "⚠ EarnApp-Reviewer.exe not found"
          echo ""
          echo "Checking for source files..."
          [ -f "main.py" ] && echo "✓ main.py found" || echo "⚠ main.py not found"
          [ -f "gui.py" ] && echo "✓ gui.py found" || echo "⚠ gui.py not found"
          [ -f "backend.py" ] && echo "✓ backend.py found" || echo "⚠ backend.py not found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            EarnApp-Reviewer.exe
            requirements.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          retention-days: 30
